services:
  db:
    image: postgis/postgis:17-3.4
    environment:
      POSTGRES_DB: biketory
      POSTGRES_USER: biketory
      POSTGRES_PASSWORD: biketory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biketory"]
      interval: 5s
      retries: 10

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --config gunicorn.conf.py biketory.wsgi:application"
    volumes:
      - staticfiles:/app/staticfiles
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: biketory
      DB_USER: biketory
      DB_PASSWORD: biketory
      ALLOWED_HOSTS: biketory.example.com,localhost
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/biketory.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  pgdata:
  staticfiles:
