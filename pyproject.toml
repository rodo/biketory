[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "biketory.settings"
pythonpath = ["."]
python_files = ["tests.py", "test_*.py"]
addopts = "--cov=traces --cov-report=xml --cov-report=term-missing"

[tool.coverage.run]
omit = ["*/migrations/*", "*/venv/*", "manage.py"]
relative_files = true

[tool.coverage.report]
skip_empty = true

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["statistics"]

[tool.bandit]
exclude_dirs = ["traces/tests", "traces/migrations", "venv"]
skips = ["B101", "B105"]
