name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write  # required to post coverage comments

jobs:
  pytest:
    name: pytest + coverage
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/osgeo/gdal:ubuntu-small-latest

    services:
      postgis:
        image: postgis/postgis:17-3.4
        env:
          POSTGRES_DB: biketory
          POSTGRES_USER: biketory
          POSTGRES_PASSWORD: biketory
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: biketory
      DB_USER: biketory
      DB_PASSWORD: biketory
      DB_HOST: postgis
      DJANGO_SETTINGS_MODULE: biketory.settings_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare CI settings
        run: cp biketory/settings.dist biketory/settings_ci.py

      - name: Install pip
        run: apt-get update -qq && apt-get install -y --no-install-recommends python3-pip

      - name: Install Python dependencies
        run: pip install --break-system-packages -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Django deployment checks
        run: python manage.py check --deploy --fail-level ERROR

      - name: Run tests
        run: pytest

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarcloud:
    name: SonarCloud Analysis
    needs: [pytest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
