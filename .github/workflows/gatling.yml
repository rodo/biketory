name: Gatling

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  all-scenarios:
    name: All Gatling scenarios
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:17-3.4
        env:
          POSTGRES_DB: biketory
          POSTGRES_USER: biketory
          POSTGRES_PASSWORD: biketory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: biketory
      DB_USER: biketory
      DB_PASSWORD: biketory
      DB_HOST: localhost
      DJANGO_SETTINGS_MODULE: biketory.settings_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare CI settings
        run: cp biketory/settings.dist biketory/settings_ci.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install GDAL system dependency
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Start procrastinate worker
        run: python manage.py procrastinate worker -q analyze,badges,tiles &

      - name: Start Django server
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/ > /dev/null && break
            sleep 1
          done

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: gatling/pom.xml

      - name: Run Gatling AllSimulation
        working-directory: gatling
        run: >
          mvn gatling:test
          -Dgatling.simulationClass=biketory.AllSimulation
          -DbaseUrl=http://localhost:8000

      - name: Build Gatling report comment
        if: always()
        id: report
        run: |
          STATS_FILE=$(find gatling/target/gatling -name "stats.json" -path "*/js/*" 2>/dev/null | head -1)
          if [ -z "$STATS_FILE" ]; then
            echo "comment=**Gatling** — No report generated." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          jq -r '
            .stats as $s |
            (if $s.numberOfRequests.ko == 0 then "pass" else "fail" end) as $result |
            (if $result == "pass" then ":white_check_mark:" else ":x:" end) as $icon |
            "\($icon) **Gatling — All Scenarios**\n\n" +
            "| Metric | Value |\n" +
            "|---|---|\n" +
            "| Requests | \($s.numberOfRequests.total) (\($s.numberOfRequests.ok) OK / \($s.numberOfRequests.ko) KO) |\n" +
            "| Mean response time | \($s.meanResponseTime.total) ms |\n" +
            "| Min / Max | \($s.minResponseTime.total) ms / \($s.maxResponseTime.total) ms |\n" +
            "| p50 | \($s.percentiles1.total) ms |\n" +
            "| p75 | \($s.percentiles2.total) ms |\n" +
            "| p95 | \($s.percentiles3.total) ms |\n" +
            "| p99 | \($s.percentiles4.total) ms |"
          ' "$STATS_FILE" > /tmp/gatling-comment.md
          {
            echo "comment<<GHEOF"
            cat /tmp/gatling-comment.md
            echo ""
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.report.outputs.comment }}
          comment-tag: gatling-all

      - name: Upload Gatling report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gatling-report
          path: gatling/target/gatling/*/
