name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write  # required to post coverage comments

jobs:
  pytest:
    name: pytest + coverage
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: biketory
          POSTGRES_USER: biketory
          POSTGRES_PASSWORD: biketory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: biketory
      DB_USER: biketory
      DB_PASSWORD: biketory
      DB_HOST: localhost
      DJANGO_SETTINGS_MODULE: biketory.settings_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare CI settings
        run: cp biketory/settings.dist biketory/settings_ci.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install GDAL system dependency
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: pytest

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
